<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <title>Grinderouz223 Portal - Supercell Store</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Grinderouz223">

    <link rel="apple-touch-icon" href="assets/favicon.png">

    <style>
        :root {
            --coc-gold: #f3c31b;
            --coc-gold-dark: #d4a017;
            --coc-stone-dark: #111;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            /* Extra safety for iOS double-tap */
            touch-action: manipulation;
        }

        /* Custom Scrollbar for the container */
        ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--coc-gold) 0%, var(--coc-gold-dark) 100%);
            border: 2px solid #1a1a1a;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #fff275;
        }

        .embed-container {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .embed-header {
            background: #1a1a1a;
            border-bottom: 2px solid var(--coc-gold);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-family: 'Open Sans', sans-serif;
            z-index: 100;
        }

        iframe {
            flex-grow: 1;
            border: none;
            width: 100%;
            height: 100%;
        }

        .btn-external {
            background: var(--coc-gold);
            color: #111;
            padding: 6px 14px;
            border-radius: 6px;
            font-weight: 800;
            font-size: 12px;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-external:hover {
            background: #fff;
            transform: scale(1.05);
        }
        .btn-internal {
            background: white;
            color: #111;
            padding: 6px 14px;
            border-radius: 6px;
            font-weight: 800;
            font-size: 12px;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-internal:hover {
            background: #02ca88;
            transform: scale(1.05);
        }

        .loader-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
            text-align: center;
        }

        /* Animated PNG Loader */
        .loader-image {
            width: 80px; /* Adjust size as needed */
            height: auto;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="embed-container">
        <header class="embed-header">
            <div class="flex items-center gap-3">
                <img src="https://store.supercell.com/_next/static/media/logo.0fb8db51.png" alt="COC" onerror="this.src='assets/favicon.png'" class="w-6 h-6">
                <span class="font-black uppercase tracking-tighter hidden sm:inline">Grinderouz223 Portal</span>
            </div>
            <a href="https://store.supercell.com/clashofclans" target="_blank" class="btn-external">
                Launch Full Site
            </a>
            <a href="index.html" class="btn-internal">
                Back Home
            </a>
        </header>

        <!-- Loading State with PNG Image -->
        <div id="loader" class="loader-overlay">
            <img src="https://store.supercell.com/_next/static/media/logo.0fb8db51.png" alt="Loading..." class="loader-image" onerror="this.src='assets/favicon.png'">
            <p class="text-gray-500 font-bold mt-4 uppercase text-xs tracking-widest">Loading Clan Assets...</p>
        </div>

        <iframe 
            id="siteFrame"
            src="https://store.supercell.com/clashofclans" 
            title="Supercell Store"
            onload="document.getElementById('loader').style.display='none';"
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
