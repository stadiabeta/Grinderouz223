<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grinderouz223 - Media Gallery</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --coc-gold: #f3c31b;
            --coc-gold-dark: #d4a017;
            --coc-blue: #4a90e2;
            --coc-stone: #0f172a;
            --coc-stone-dark: #020617;
            --coc-border: #334155; 
        }

        body {
            font-family: 'Open+Sans', sans-serif;
            background-color: var(--coc-stone);
            color: #f8fafc; 
            scroll-behavior: smooth;
        }

        .hero-pattern {
            background-color: var(--coc-stone);
            background-image: url("https://www.transparenttextures.com/patterns/cubes.png");
            background-blend-mode: overlay;
        }

        .media-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--coc-border);
            background: #1e293b; 
            border-radius: 12px;
            overflow: hidden;
        }

        .media-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
        }

        .category-pill {
            transition: all 0.2s;
            cursor: pointer;
            background-color: #1e293b;
            border: 2px solid #475569;
            color: #e2e8f0;
        }

        .category-pill:hover {
            background-color: #334155;
        }

        .category-pill.active {
            background-color: var(--coc-gold);
            color: #020617; 
            border-color: var(--coc-gold);
        }

        ::-webkit-scrollbar {
            width: 16px;
            height: 16px;
        }

        ::-webkit-scrollbar-track {
            background: var(--coc-stone-dark);
            border-left: 2px solid var(--coc-stone);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--coc-gold) 0%, var(--coc-gold-dark) 100%);
            border: 3px solid var(--coc-stone-dark);
            border-radius: 4px;
            box-shadow: 0 0 5px rgba(0,0,0,0.8);
            cursor: pointer;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #fff275 0%, var(--coc-gold) 100%);
            box-shadow: 0 0 10px var(--coc-gold);
        }

        ::-webkit-scrollbar-corner {
            background: var(--coc-stone-dark);
        }

        * {
            scrollbar-width: auto;
            scrollbar-color: var(--coc-gold-dark) var(--coc-stone-dark);
        }

        #lightbox {
            display: none;
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="hero-pattern min-h-screen">

    <div id="navbar-container"></div>

    <main class="pt-32 pb-20 px-6 max-w-7xl mx-auto">
        <header class="text-center mb-16">
            <h1 class="text-5xl font-black text-white mb-4 uppercase tracking-tight drop-shadow-md">Clan Media</h1>
        </header>

        <div class="flex flex-wrap justify-center gap-3 mb-12" id="category-filters">
            <button class="category-pill active px-6 py-2 rounded-full font-bold uppercase text-xs tracking-widest" data-category="all">All Media</button>
            <button class="category-pill px-6 py-2 rounded-full font-bold uppercase text-xs tracking-widest" data-category="base">Bases</button>
        </div>

        <div id="media-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
        </div>

        <div id="empty-state" class="hidden text-center py-20">
            <p class="text-slate-400 font-bold uppercase tracking-widest text-xl">No media found in this category.</p>
        </div>
    </main>

    <div id="lightbox" class="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-4">
        <button id="close-lightbox" class="absolute top-6 right-6 text-white hover:text-yellow-500 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
        <div id="lightbox-content" class="max-w-5xl w-full flex flex-col items-center">
        </div>
    </div>

    <div id="footer-container"></div>

    <script src="navbar.js"></script>
    <script src="updatewidget.js"></script>
    <script src="medialist.js"></script>
    <script src="zoom.js"></script>
</body>
</html>
