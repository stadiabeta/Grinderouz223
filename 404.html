<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grinderouz223 - 404 Not Found</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="assets/favicon.png">    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --coc-gold: #f3c31b;
            --coc-gold-dark: #d4a017;
            --coc-stone: #0f172a; 
            --coc-stone-dark: #020617; 
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--coc-stone-dark);
            color: #f8fafc;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        .coc-btn-gold {
            background: linear-gradient(to bottom, #f3c31b, #d4a017);
            box-shadow: 0 4px 0 #b0840a, inset 0 1px 2px rgba(255,255,255,0.4);
            border: 1px solid #8c6a08;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            transition: all 0.2s;
        }

        .coc-btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #b0840a, inset 0 1px 2px rgba(255,255,255,0.4);
        }

        .coc-btn-gold:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b0840a;
        }

        .bg-pattern {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle at 2px 2px, #1e293b 1px, transparent 0);
            background-size: 40px 40px;
            opacity: 0.2;
            z-index: -1;
        }

        .glitch-text {
            color: var(--coc-gold);
            text-shadow: 3px 3px 0px rgba(0,0,0,1);
        }
    </style>
</head>
<body>
    <div id="navbar-container"></div>
    <div class="bg-pattern"></div>

    
    <main class="text-center px-6">
        <div class="mb-8 flex justify-center">
            <div class="relative w-48 h-48 sm:w-64 sm:h-64 floating">
                <div class="absolute inset-0 flex items-center justify-center">
                    <p data-emojis data-emoji-size="200px">:404:</p>
                </div>
            </div>
        </div>

        <h1 class="text-3xl sm:text-4xl font-extrabold mb-4 uppercase tracking-tighter">
            Village Under Attack!
        </h1>
        <p class="text-slate-400 text-lg mb-8 max-w-md mx-auto">
            The builders couldn't find the page you're looking for. It might have been destroyed in a clan war or moved to a new league.
        </p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="index.html" class="coc-btn-gold px-8 py-4 rounded-xl font-bold uppercase tracking-widest text-lg">
                Return to Home
            </a>
            <a href="https://discord.gg/jEN9NNdA4v" target="_blank" class="bg-slate-800 hover:bg-slate-700 text-white px-8 py-4 rounded-xl font-bold uppercase tracking-widest text-lg transition-colors border border-slate-600">
                Contact Support
            </a>
        </div>

        <div class="mt-12 text-slate-500 text-sm italic">
            Error Code: BUILDING_NOT_CONSTRUCTED
        </div>
    </main>

    <script src="emojis.js"></script>

    <script>
        
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            document.querySelector('.bg-pattern').style.transform = `translate(${x * 10}px, ${y * 10}px)`;
        });
    </script>
</body>
</html>
